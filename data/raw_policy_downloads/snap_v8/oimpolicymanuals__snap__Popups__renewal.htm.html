<p class="GlossaryPopupHeading">renewal</p>
<p style="font-size: 10pt;">A review by the CAO of all eligibility factors 
 subject to change, to determine if a recipient is eligible for assistance; 
 formerly known as &quot;recertification&quot; or &quot;redetermination.&quot;. 
 A renewal is either complete or partial.</p>
